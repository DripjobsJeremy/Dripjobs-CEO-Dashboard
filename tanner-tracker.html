const isEmbedded = window.self !== window.top;

function TannerTracker() {
  const SK = "dj_tt_v10";
  const [tickets, setTicketsRaw] = useState([]);
  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");
  const [sort, setSort] = useState("newest");
  const [editId, setEditId] = useState(null);
  const [editData, setEditData] = useState({});
  const [slackMsg, setSlackMsg] = useState("");
  const [pendingAI, setPendingAI] = useState(null);
  const [classifying, setClassifying] = useState(false);
  const [overrides, setOverrides] = useState({type:"",sub:"",priority:""});
  const [showCEO, setShowCEO] = useState(false);
  const [showStats, setShowStats] = useState(false);
  const [toast, setToast] = useState({msg:"",show:false});
  const [dateVal, setDateVal] = useState(new Date().toISOString().split("T")[0]);
  const [apiKey, setApiKey] = useState("");
  const [showAdd, setShowAdd] = useState(false);
  const [ceoTab, setCeoTab] = useState("ceo");
  const [ghToken, setGhToken] = useState(() => { try { return localStorage.getItem("dj_gh_token")||""; } catch { return ""; } });
  const [publishing, setPublishing] = useState(false);
  const [showTokenInput, setShowTokenInput] = useState(false);
  const [dark, setDark] = useState(() => {
    if (isEmbedded) return true; // parent will override via postMessage
    try { return localStorage.getItem("dj_tt_dark") === "1"; } catch { return false; }
  });

  useEffect(() => {
    if (isEmbedded) return;
    try { localStorage.setItem("dj_tt_dark", dark ? "1" : "0"); } catch {}
  }, [dark]);

  // Sync dark mode with parent CEO Dashboard when embedded in iframe
  useEffect(() => {
    if (!isEmbedded) return;
    const handler = (e) => {
      if (e.data && e.data.type === 'dj-theme') setDark(e.data.dark);
      if (e.data && e.data.type === 'dj-refresh') loadFromJSON();
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: 'dj-theme-request' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const T = dark ? DK : LT;

  const setTickets = useCallback(v => {
    setTicketsRaw(v);
    try { localStorage.setItem(SK, JSON.stringify(v)); } catch {}
  }, []);

  const loadFromJSON = () =>
    fetch("https://raw.githubusercontent.com/DripjobsJeremy/Dripjobs-CEO-Dashboard/main/tanner-tickets.json?v=" + Date.now())
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(data => { if (Array.isArray(data) && data.length > 0) setTicketsRaw(data); else setTicketsRaw([...INITIAL_SEED]); })
      .catch(() => setTicketsRaw([...INITIAL_SEED]));

  useEffect(() => {
    loadFromJSON();
  }, []);

  const showToast = msg => {
    setToast({msg, show:true});
    setTimeout(() => setToast(t => ({...t, show:false})), 2800);
  };

  // ── Stats ──
  const total      = tickets.length;
  const bugs       = tickets.filter(t => t.type==="bug");
  const enhs       = tickets.filter(t => t.type==="enhancement");
  const missed      = tickets.filter(t => t.sub==="missed");
  const nice        = tickets.filter(t => t.sub==="nicetohave");
  const considered  = tickets.filter(t => t.sub==="considered");
  const resolved   = tickets.filter(t => t.status==="resolved");
  const inProgress = tickets.filter(t => t.status==="in-progress");
  const openList   = tickets.filter(t => t.status==="open");
  const resolvedBugs  = resolved.filter(t => t.type==="bug");
  const resolvedEnhs  = resolved.filter(t => t.type==="enhancement");
  const resolvedMissed = resolved.filter(t => t.sub==="missed");
  const resolvedRate  = Math.round(resolved.length / Math.max(total,1) * 100);
  const INACTIVE = new Set(["resolved","wont-fix","planned-v2","on-hold","postponed"]);
  const urgentOpen    = tickets.filter(t => t.priority==="urgent" && !INACTIVE.has(t.status));
  const withClickup   = tickets.filter(t => t.clickup && t.clickup.length>0);

  // ── Filter / Sort ──
  let filtered = tickets.filter(t => {
    if (filter==="all")          return true;
    if (filter==="resolved")     return t.status==="resolved";
    if (filter==="in-progress")  return t.status==="in-progress";
    if (filter==="open")         return t.status==="open";
    if (filter==="bug")          return t.type==="bug";
    if (filter==="enhancement")  return t.type==="enhancement";
    if (filter==="missed")       return t.sub==="missed";
    if (filter==="nicetohave")   return t.sub==="nicetohave";
    if (filter==="considered")   return t.sub==="considered";
    if (filter==="urgent")       return t.priority==="urgent";
    if (filter==="planned-v2")   return t.status==="planned-v2";
    if (filter==="on-hold")      return t.status==="on-hold";
    if (filter==="postponed")    return t.status==="postponed";
    return true;
  });
  if (search) filtered = filtered.filter(t =>
    t.title.toLowerCase().includes(search.toLowerCase()) ||
    t.desc.toLowerCase().includes(search.toLowerCase()) ||
    (t.area||"").toLowerCase().includes(search.toLowerCase()) ||
    t.id.toLowerCase().includes(search.toLowerCase())
  );
  if (sort==="oldest")   filtered.sort((a,b) => a.date.localeCompare(b.date));
  else if (sort==="newest")   filtered.sort((a,b) => b.date.localeCompare(a.date));
  else if (sort==="priority") filtered.sort((a,b) => (PO[a.priority]||2)-(PO[b.priority]||2));
  else if (sort==="type")     filtered.sort((a,b) => a.type.localeCompare(b.type));
  else if (sort==="status")   filtered.sort((a,b) => a.status.localeCompare(b.status));

  // ── Actions ──
  const changeStatus = (id, val) => {
    setTickets(tickets.map(t => t.id===id ? {...t,status:val} : t));
    showToast(`Status → ${SD(val)}`);
  };
  const deleteTicket = id => {
    if (!confirm("Delete this ticket?")) return;
    setTickets(tickets.filter(t => t.id!==id));
    showToast("Deleted");
  };
  const openEdit = id => {
    const t = tickets.find(t => t.id===id);
    if (!t) return;
    setEditData({...t});
    setEditId(id);
  };
  const saveEdit = () => {
    setTickets(tickets.map(t => t.id===editId ? {...t,...editData} : t));
    setEditId(null);
    showToast("Saved ✓");
  };

  // ── AI Classify ──
  const classify = async () => {
    if (!slackMsg.trim()) { showToast("Paste a Slack message first"); return; }
    setClassifying(true);
    const prompt = `You are a product manager at DripJobs, a contractor CRM. Classify this CEO Slack message as a product ticket. Return ONLY valid JSON, no markdown.\n\nMessage: """${slackMsg}"""\n\nJSON schema: {"title":"Short actionable title max 80 chars","summary":"1-2 sentence description","type":"bug or enhancement","sub":"missed or nicetohave or na","priority":"urgent or high or normal or low","area":"feature area","reasoning":"1 sentence explaining classification"}\n\nRules:\n- bug = broken behavior, regression, or wrong data\n- enhancement = new feature or UX improvement\n- missed = enhancement that should have shipped with a prior release\n- nicetohave = additive new feature request\n- na = sub-type for bugs only\n- urgent = blocking users or data integrity risk`;
    try {
      const headers = {"Content-Type":"application/json","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"};
      if (apiKey) headers["x-api-key"] = apiKey;
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers,
        body: JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,messages:[{role:"user",content:prompt}]})
      });
      const data = await res.json();
      const raw = data.content?.find(b => b.type==="text")?.text || "";
      const ai = JSON.parse(raw.replace(/```json|```/g,"").trim());
      setPendingAI(ai);
      setOverrides({type:"",sub:"",priority:""});
    } catch(e) {
      console.error(e);
      showToast("Classification failed — see console");
    } finally { setClassifying(false); }
  };

  const confirmTicket = () => {
    if (!pendingAI) return;
    const mx = tickets.reduce((m,t) => Math.max(m, parseInt(t.id.replace("T-",""))||0), 0);
    const nid = "T-" + String(mx+1).padStart(3,"0");
    setTickets([{
      id:nid,
      title:pendingAI.title,
      desc:pendingAI.summary,
      type:overrides.type||pendingAI.type,
      sub:overrides.sub||pendingAI.sub,
      priority:overrides.priority||pendingAI.priority,
      status:"open",
      date:dateVal||new Date().toISOString().split("T")[0],
      area:pendingAI.area||"",
      source:"Slack #tanner-tickets",
      clickup:""
    }, ...tickets]);
    setSlackMsg(""); setPendingAI(null); setShowAdd(false);
    showToast(`✅ ${nid} added`);
  };

  // ── Report Generators ──
  const fmt = (arr, n=8) => arr.slice(0,n).map((t,i) => `  ${i+1}. [${t.id}] ${t.title}`).join("\n") || "  None";

  const generateCEO = () => {
    const urg = tickets.filter(t => t.priority==="urgent" && t.status!=="resolved" && t.status!=="wont-fix");
    const bm  = missed.filter(t => t.type==="bug" && t.status!=="resolved");
    const em  = missed.filter(t => t.type==="enhancement" && t.status!=="resolved");
    const no  = nice.filter(t => t.status!=="resolved");
    const d   = new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
    return `DRIPJOBS — #tanner-tickets CEO SUMMARY\nGenerated: ${d}\n${"═".repeat(52)}\n\nOVERVIEW\n${"─".repeat(52)}\n  Total Tickets:           ${total}\n  Bugs:                    ${bugs.length}  |  Enhancements: ${enhs.length}\n  Newly Surfaced (open):   ${bm.length+em.length}  |  Nice-to-Have: ${no.length}\n  Resolved:                ${resolved.length} (${resolvedRate}% resolution rate)\n  In Progress:             ${inProgress.length}\n  Urgent Open:             ${urg.length}\n  Linked to ClickUp:       ${withClickup.length}\n\n${"═".repeat(52)}\n🚨 URGENT OPEN ITEMS (${urg.length})\n${"─".repeat(52)}\n${fmt(urg)}\n\n${"═".repeat(52)}\n🐛 BUGS — NEWLY SURFACED (open, ${bm.length})\n${"─".repeat(52)}\n${fmt(bm)}\n\n${"═".repeat(52)}\n⚠️ ENHANCEMENTS — NEWLY SURFACED (open, ${em.length})\n${"─".repeat(52)}\n${fmt(em)}\n\n${"═".repeat(52)}\n💡 TOP NICE-TO-HAVE REQUESTS (${no.length} open)\n${"─".repeat(52)}\n${fmt(no)}\n\n${"═".repeat(52)}\n✅ RESOLVED (${resolved.length} total)\n${"─".repeat(52)}\n  Bugs Resolved:           ${resolvedBugs.length}\n  Enhancements Resolved:   ${resolvedEnhs.length}\n  Newly Surfaced Resolved: ${resolvedMissed.length}\n${fmt(resolved.slice(0,8))}\n\n${"═".repeat(52)}\nSTRATEGIC NOTES\n${"─".repeat(52)}\n• ${missed.filter(t=>t.status!=="resolved").length} "Newly Surfaced" items still open — gaps from prior releases.\n• ${urg.length} urgent items unresolved — need immediate team attention.\n• ${resolvedRate}% overall resolution rate across ${total} tracked requests.`;
  };

  const generateStats = () => {
    const byArea = {};
    tickets.forEach(t => {
      const a = t.area||"Unknown";
      if (!byArea[a]) byArea[a] = {total:0,resolved:0};
      byArea[a].total++;
      if (t.status==="resolved") byArea[a].resolved++;
    });
    const topAreas = Object.entries(byArea).sort((a,b) => b[1].total-a[1].total).slice(0,10);
    const byPri = {urgent:0,high:0,normal:0,low:0};
    tickets.filter(t => t.status!=="resolved" && t.status!=="wont-fix").forEach(t => { byPri[t.priority]=(byPri[t.priority]||0)+1; });
    const d = new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
    return `DRIPJOBS — TICKET RESOLUTION STATS\nGenerated: ${d}\n${"═".repeat(52)}\n\nOVERALL HEALTH\n${"─".repeat(52)}\n  Total Tracked:           ${total}\n  Open:                    ${openList.length}\n  In Progress:             ${inProgress.length}\n  Resolved:                ${resolved.length}\n  Resolution Rate:         ${resolvedRate}%\n\nBY TYPE\n${"─".repeat(52)}\n  Bugs Total:              ${bugs.length}  (${resolvedBugs.length} resolved, ${bugs.length-resolvedBugs.length} open)\n  Enhancements Total:      ${enhs.length}  (${resolvedEnhs.length} resolved, ${enhs.length-resolvedEnhs.length} open)\n\nBY CLASSIFICATION\n${"─".repeat(52)}\n  Newly Surfaced Total:    ${missed.length}  (${resolvedMissed.length} resolved)\n  Nice-to-Have Total:      ${nice.length}  (${resolved.filter(t=>t.sub==="nicetohave").length} resolved)\n\nOPEN BACKLOG BY PRIORITY\n${"─".repeat(52)}\n  🔴 Urgent:   ${byPri.urgent||0}\n  🟡 High:     ${byPri.high||0}\n  🟣 Normal:   ${byPri.normal||0}\n  ⚪ Low:      ${byPri.low||0}\n\nLINKED TO CLICKUP\n${"─".repeat(52)}\n  With ClickUp ticket:     ${withClickup.length} of ${total}\n  Without ClickUp link:    ${total-withClickup.length}\n\nALL RESOLVED TICKETS\n${"─".repeat(52)}\n${resolved.map((t,i) => `  ${i+1}. [${t.id}] ${t.title}\n     ${t.resolvedNote||t.clickup||"No ClickUp link"}`).join("\n")}\n\nTOP 10 AREAS BY VOLUME\n${"─".repeat(52)}\n${topAreas.map(([a,v],i) => `  ${i+1}. ${a}: ${v.total} total, ${v.resolved} resolved`).join("\n")}`;
  };

  const generateRebuttal = () => {
    const missedBugs  = missed.filter(t => t.type==="bug");
    const missedEnhs  = missed.filter(t => t.type==="enhancement");
    const resolvedBugsRate    = Math.round(resolvedBugs.length/Math.max(bugs.length,1)*100);
    const resolvedEnhsRate    = Math.round(resolvedEnhs.length/Math.max(enhs.length,1)*100);
    const resolvedMissedRate  = Math.round(resolvedMissed.length/Math.max(missed.length,1)*100);
    const openMissed  = missed.filter(t => t.status!=="resolved" && t.status!=="wont-fix");
    const d = new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
    const pad = (n,w=5) => String(n).padStart(w);
    return `DRIPJOBS — #TANNER-TICKETS: CHANNEL SUMMARY\nGenerated: ${d}\n${"═".repeat(56)}\n\nABOUT THIS TRACKER\n${"─".repeat(56)}\n  #tanner-tickets is a dedicated channel for surfacing\n  product feedback and requests. This tracker was built\n  to organize every item raised there — classifying,\n  prioritizing, and following each one through to\n  resolution.\n\n  Total items tracked:                              ${pad(total)}\n  Resolved:                                         ${pad(resolved.length)}  (${resolvedRate}%)\n  In progress:                                      ${pad(inProgress.length)}\n\n${"═".repeat(56)}\nCLASSIFICATION GUIDE\n${"═".repeat(56)}\n\n  The labels below describe the nature and context of\n  each item — not a judgment on work quality.\n\n  🐛  BUG\n${"─".repeat(56)}\n    A defect or regression identified after a release.\n    All bugs have been triaged, prioritized, and routed\n    to the appropriate team for resolution.\n\n    Bugs tracked:     ${pad(bugs.length)}\n    Bugs resolved:    ${pad(resolvedBugs.length)} of ${bugs.length}  (${resolvedBugsRate}%)\n\n  ✨  ENHANCEMENT\n${"─".repeat(56)}\n    A feature request or improvement. Enhancements are\n    reviewed against the roadmap and engineering capacity\n    before being scheduled.\n\n    Enhancements tracked:   ${pad(enhs.length)}\n    Enhancements resolved:  ${pad(resolvedEnhs.length)} of ${enhs.length}  (${resolvedEnhsRate}%)\n\n  ⚠️   NEWLY SURFACED\n${"─".repeat(56)}\n    An item raised in the channel that was not already\n    tracked in the product backlog at the time it was\n    posted. These items have since been logged,\n    classified, and are being followed through.\n\n      Bugs in this category:          ${pad(missedBugs.length)}\n      Enhancements in this category:  ${pad(missedEnhs.length)}\n      Open:                           ${pad(openMissed.length)}\n      Closed:                         ${pad(resolvedMissed.length)} of ${missed.length}  (${resolvedMissedRate}%)\n\n  💬  CONSIDERED\n${"─".repeat(56)}\n    An item the product team was already tracking,\n    investigating, or had made a deliberate decision\n    about at or before the time it was raised in the\n    channel. This label is informational — it helps\n    distinguish new requests from items already in\n    the team's active workflow.\n\n    Items with prior tracking:  ${pad(considered.length)}\n\n  💡  NICE-TO-HAVE\n${"─".repeat(56)}\n    A valuable idea or UX improvement that has been\n    documented and organized for future roadmap\n    consideration.\n\n    Items tracked:  ${pad(nice.length)}\n\n${"═".repeat(56)}\nRESOLUTION SUMMARY\n${"═".repeat(56)}\n\n    Overall resolution rate:    ${resolvedRate}%\n    Bugs resolved:              ${resolvedBugs.length} of ${bugs.length}  (${resolvedBugsRate}%)\n    Enhancements resolved:      ${resolvedEnhs.length} of ${enhs.length}  (${resolvedEnhsRate}%)\n    Newly Surfaced closed:      ${resolvedMissed.length} of ${missed.length}  (${resolvedMissedRate}%)\n\n${"═".repeat(56)}\nOVERVIEW\n${"─".repeat(56)}\n  Item                            Count\n  ${"─".repeat(36)}\n  Total items:                    ${pad(total)}\n  Already in backlog when raised: ${pad(considered.length)}\n  Bugs:                           ${pad(bugs.length)}   (${resolvedBugs.length} resolved)\n  Enhancements:                   ${pad(enhs.length)}   (${resolvedEnhs.length} resolved)\n  Overall resolved:               ${pad(resolved.length)}   (${resolvedRate}%)\n  ${"─".repeat(36)}\n\n  This tracker is a living record of how the product\n  team is managing feedback from the channel — every\n  item organized, prioritized, and followed through.`;
  };

  const exportCSV = () => {
    const h = ["ID","Title","Type","Sub-Type","Priority","Status","Area","Date","ClickUp","Resolved Note","Notes"];
    const rows = tickets.map(t => [
      t.id,
      `"${(t.title||"").replace(/"/g,'""')}"`,
      t.type, t.sub==="missed"?"Newly Surfaced":t.sub, t.priority, t.status,
      `"${(t.area||"").replace(/"/g,'""')}"`,
      t.date, t.clickup||"",
      `"${(t.resolvedNote||"").replace(/"/g,'""')}"`,
      `"${(t.notes||"").replace(/"/g,'""')}"`
    ].join(","));
    const a = document.createElement("a");
    a.href = "data:text/csv;charset=utf-8," + encodeURIComponent([h.join(","), ...rows].join("\n"));
    a.download = `tanner-tickets-${new Date().toISOString().split("T")[0]}.csv`;
    a.click();
    showToast("CSV exported ✓");
  };

  const publish = async () => {
    if (!ghToken) { setShowTokenInput(true); return; }
    setPublishing(true);
    try {
      const REPO = "DripjobsJeremy/Dripjobs-CEO-Dashboard";
      const jsonStr = JSON.stringify(tickets, null, 2);
      const encoded = btoa(unescape(encodeURIComponent(jsonStr)));
      let sha;
      try {
        const r = await fetch(`https://api.github.com/repos/${REPO}/contents/tanner-tickets.json`, { headers: { Authorization: `token ${ghToken}` } });
        if (r.ok) sha = (await r.json()).sha;
      } catch {}
      const body = { message: `Update tanner-tickets — ${new Date().toLocaleDateString()}`, content: encoded };
      if (sha) body.sha = sha;
      const r = await fetch(`https://api.github.com/repos/${REPO}/contents/tanner-tickets.json`, {
        method: "PUT",
        headers: { Authorization: `token ${ghToken}`, "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      if (!r.ok) throw new Error();
      showToast("Published ✓ · Live on CEO Dashboard in ~60s");
    } catch { showToast("Publish failed — check GitHub token"); }
    finally { setPublishing(false); }
  };

  // ── Shared input style ──
  const inp = {width:"100%",background:T.surface3,border:`1.5px solid ${T.border2}`,borderRadius:8,padding:"8px 11px",fontSize:13,fontFamily:"inherit",outline:"none",color:T.text,boxSizing:"border-box"};
  const sel = {...inp,cursor:"pointer"};

  const FILTERS = [
    {k:"all",l:"All"},
    {k:"bug",l:"🐛 Bugs"},
    {k:"enhancement",l:"✨ Enhancements"},
    {k:"missed",l:"⚠️ Newly Surfaced"},
    {k:"nicetohave",l:"💡 Nice-to-Have"},
    {k:"considered",l:"💬 Considered"},
    {k:"urgent",l:"🚨 Urgent"},
    {k:"open",l:"🔓 Open"},
    {k:"in-progress",l:"🔵 In Progress"},
    {k:"resolved",l:"✅ Resolved"},
    {k:"planned-v2",l:"🗺️ Planned for V2"},
    {k:"on-hold",l:"⏸️ On Hold"},
    {k:"postponed",l:"⏭️ Postponed"},
  ];

  return (
    <div data-dark={dark||undefined} style={{minHeight:"100vh",background:T.bg,fontFamily:"'Inter',sans-serif",transition:"background 0.2s,color 0.2s"}}>

      {/* Toast */}
      {toast.show && (
        <div style={{position:"fixed",top:20,right:20,zIndex:2000,background:"#1A1A2E",color:"#fff",padding:"10px 18px",borderRadius:10,fontSize:13,fontWeight:600,boxShadow:"0 8px 28px rgba(0,0,0,0.22)",animation:"none"}}>
          {toast.msg}
        </div>
      )}

      {/* Header */}
      <div style={{background:T.surface,borderBottom:`1.5px solid ${T.border}`,padding:"13px 28px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 8px rgba(110,99,229,0.05)"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:38,height:38,borderRadius:10,background:PURPLE,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:17,letterSpacing:"-0.5px"}}>D</div>
          <div>
            <div style={{fontWeight:700,fontSize:16,color:T.text,lineHeight:1.2}}>#Tanner-Tickets</div>
            <div style={{fontSize:11,color:T.text3,lineHeight:1.2}}>DripJobs Product Backlog · {total} tickets · {resolved.length} resolved</div>
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          {!isEmbedded && (
            <button className="btn btn-gray" onClick={() => setShowAdd(v => !v)} style={{fontSize:12}}>
              {showAdd ? "▲ Close" : "＋ Add Ticket"}
            </button>
          )}
          <button
            style={{fontSize:12,padding:"8px 14px",borderRadius:8,border:dark?"1.5px solid "+PURPLE:"none",cursor:"pointer",fontWeight:600,fontFamily:"inherit",background:dark?"#0D0C18":PURPLE,color:dark?PURPLE:"#fff"}}
            onClick={() => { setCeoTab("tanner"); setShowCEO(true); setShowStats(false); }}
          >
            📊 Channel Context
          </button>
          <button
            style={{fontSize:12,padding:"8px 14px",borderRadius:8,border:dark?"1.5px solid "+PURPLE:"none",cursor:"pointer",fontWeight:600,fontFamily:"inherit",background:dark?"#0D0C18":PURPLE,color:dark?PURPLE:"#fff"}}
            onClick={() => { setShowStats(true); setShowCEO(false); }}
          >
            📈 Stats
          </button>
          <button
            style={{fontSize:12,padding:"8px 14px",borderRadius:8,border:dark?"1.5px solid "+PURPLE:"none",cursor:"pointer",fontWeight:600,fontFamily:"inherit",background:dark?"#0D0C18":PURPLE,color:dark?PURPLE:"#fff"}}
            onClick={() => { setCeoTab("ceo"); setShowCEO(true); setShowStats(false); }}
          >
            📋 CEO Brief
          </button>
          <button className="btn btn-gray" style={{fontSize:12}} onClick={exportCSV}>
            ⬇ CSV
          </button>
          {!isEmbedded && (
            <button
              className="btn btn-gray"
              onClick={() => { if (!publishing) publish(); }}
              style={{fontSize:12,background:publishing?"#6B7280":"#10B981",color:"#fff",border:"none",cursor:publishing?"not-allowed":"pointer"}}
              title="Push current ticket data to CEO Dashboard"
            >
              {publishing ? "Publishing…" : "🚀 Publish"}
            </button>
          )}
          {!isEmbedded && (
            <button
              className="btn btn-gray"
              onClick={() => setDark(d => !d)}
              style={{fontSize:15,padding:"6px 11px"}}
              title={dark ? "Switch to Light Mode" : "Switch to Dark Mode"}
            >
              {dark ? "☀️" : "🌙"}
            </button>
          )}
        </div>
      </div>

      <div style={{maxWidth:1080,margin:"0 auto",padding:"22px 18px"}}>

        {/* Stat Cards */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:18}}>
          {[
            {l:"Total Tickets",v:total,       c:T.text},
            {l:"🐛 Bugs",      v:bugs.length,  c:"#EF4444"},
            {l:"✨ Enhancements",v:enhs.length, c:PURPLE},
            {l:"⚠️ Newly Surfaced (open)",v:missed.filter(t=>t.status!=="resolved").length,c:"#F59E0B"},
            {l:"✅ Resolved",  v:resolved.length,   c:"#10B981"},
            {l:"🔵 In Progress",v:inProgress.length, c:"#3B82F6"},
            {l:"🚨 Urgent Open",v:urgentOpen.length, c:"#EF4444"},
            {l:"🔗 ClickUp Linked",v:withClickup.length, c:T.text2},
          ].map((s,i) => (
            <div key={i} className="stat-card">
              <div style={{fontSize:11,color:T.text3,fontWeight:600,marginBottom:5}}>{s.l}</div>
              <div style={{fontSize:28,fontWeight:700,color:s.c,lineHeight:1}}>{s.v}</div>
            </div>
          ))}
        </div>

        {/* GitHub Token Panel */}
        {showTokenInput && !isEmbedded && (
          <div style={{background:T.surface,border:`1.5px solid #10B981`,borderRadius:12,padding:"14px 18px",marginBottom:18,display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
            <span style={{fontSize:12,fontWeight:600,color:T.text}}>🔑 GitHub token needed to publish:</span>
            <input
              type="password"
              value={ghToken}
              onChange={e => { setGhToken(e.target.value); try { localStorage.setItem("dj_gh_token", e.target.value); } catch {} }}
              placeholder="ghp_..."
              style={{flex:1,minWidth:220,background:T.surface3,border:`1.5px solid ${T.border2}`,borderRadius:8,padding:"6px 10px",fontSize:12,fontFamily:"inherit",color:T.text,outline:"none"}}
            />
            <button className="btn btn-gray" style={{fontSize:12,background:"#10B981",color:"#fff",border:"none"}} onClick={() => { setShowTokenInput(false); if (ghToken) publish(); }}>Save & Publish</button>
            <button className="btn btn-gray" style={{fontSize:12}} onClick={() => setShowTokenInput(false)}>Cancel</button>
          </div>
        )}

        {/* Add Ticket / AI Panel */}
        {showAdd && (
          <div style={{background:T.surface,border:`1.5px solid ${T.border3}`,borderRadius:12,padding:20,marginBottom:18}}>
            <div style={{fontWeight:700,fontSize:14,color:T.text,marginBottom:14}}>🤖 AI Ticket Classification</div>
            <div style={{marginBottom:10}}>
              <label style={{fontSize:12,fontWeight:600,color:T.text2,display:"block",marginBottom:4}}>Paste #tanner-tickets Slack message</label>
              <textarea
                value={slackMsg}
                onChange={e => setSlackMsg(e.target.value)}
                style={{...inp,height:80,resize:"vertical"}}
                placeholder="Paste CEO Slack message here..."
              />
            </div>
            <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
              <input type="text" value={apiKey} onChange={e => setApiKey(e.target.value)} placeholder="Anthropic API key (sk-ant-...)" style={{...inp,flex:1,minWidth:200,fontSize:12}} />
              <input type="date" value={dateVal} onChange={e => setDateVal(e.target.value)} style={{...inp,width:160}} />
              <button className="btn btn-primary" onClick={classify} disabled={classifying}>
                {classifying ? "Classifying…" : "Classify →"}
              </button>
            </div>
            <p style={{fontSize:11,color:T.text3,marginBottom:pendingAI?14:0}}>
              Note: API call goes to Anthropic directly. Requires valid API key. CORS must be allowed in your browser environment.
            </p>
            {pendingAI && (
              <div style={{background:T.surface2,borderRadius:10,border:`1.5px solid ${T.border3}`,padding:16}}>
                <div style={{fontWeight:700,fontSize:13,color:T.text,marginBottom:6}}>AI Classification Result</div>
                <div style={{fontWeight:600,fontSize:14,marginBottom:4,color:T.text}}>{pendingAI.title}</div>
                <div style={{fontSize:12,color:T.text2,marginBottom:10,lineHeight:1.5}}>{pendingAI.summary}</div>
                <div style={{fontSize:11,color:T.text2,marginBottom:12,background:T.surface,padding:"8px 12px",borderRadius:8,border:`1px solid ${T.border}`,lineHeight:1.5}}>
                  <strong>Reasoning:</strong> {pendingAI.reasoning}
                </div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14,alignItems:"center"}}>
                  <Badge cls={pendingAI.type}>{pendingAI.type}</Badge>
                  <Badge cls={pendingAI.sub}>{pendingAI.sub}</Badge>
                  <Badge cls={pendingAI.priority}>{PL(pendingAI.priority)}</Badge>
                  <span style={{fontSize:11,color:"#9CA3AF"}}>{pendingAI.area}</span>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
                  {[
                    ["type",["bug","enhancement"]],
                    ["sub",["missed","nicetohave","considered","na"]],
                    ["priority",["urgent","high","normal","low"]]
                  ].map(([k,opts]) => (
                    <div key={k}>
                      <label style={{fontSize:11,fontWeight:600,color:T.text3,display:"block",marginBottom:3}}>Override {k}</label>
                      <select value={overrides[k]} onChange={e => setOverrides(v => ({...v,[k]:e.target.value}))} style={sel}>
                        <option value="">AI: {pendingAI[k]}</option>
                        {opts.map(o => <option key={o} value={o}>{o}</option>)}
                      </select>
                    </div>
                  ))}
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button className="btn btn-primary" onClick={confirmTicket}>✅ Confirm & Add</button>
                  <button className="btn btn-gray" onClick={() => setPendingAI(null)}>Discard</button>
                </div>
              </div>
            )}
          </div>
        )}

        {/* Filter + Search */}
        <div style={{background:T.surface,border:`1.5px solid ${T.border}`,borderRadius:12,padding:"12px 14px",marginBottom:14}}>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
            {FILTERS.map(f => (
              <button key={f.k} className={`filter-pill${filter===f.k?" active":""}`} onClick={() => setFilter(f.k)}>
                {f.l}
              </button>
            ))}
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <input
              type="text"
              placeholder="Search by title, description, area, or ID…"
              value={search}
              onChange={e => setSearch(e.target.value)}
              style={{...inp,flex:1}}
            />
            <select value={sort} onChange={e => setSort(e.target.value)} style={{...sel,width:170}}>
              <option value="newest">Newest first</option>
              <option value="oldest">Oldest first</option>
              <option value="priority">By priority</option>
              <option value="type">By type</option>
              <option value="status">By status</option>
            </select>
            <span style={{fontSize:12,color:T.text3,whiteSpace:"nowrap",fontWeight:600}}>
              {filtered.length} / {total}
            </span>
          </div>
        </div>

        {/* Ticket List */}
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {filtered.map(t => {
            const pc = PCOLOR[t.priority] || "#E5E7EB";
            const isResolved = t.status==="resolved" || t.status==="wont-fix";
            return (
              <div key={t.id} className="ticket-card" style={{opacity:isResolved?0.68:1}}>
                <div className="priority-bar" style={{background:pc}} />

                {/* Meta row */}
                <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:6}}>
                  <span style={{fontSize:11,fontWeight:700,color:T.text4,letterSpacing:"0.4px"}}>{t.id}</span>
                  <Badge cls={t.type}>{t.type}</Badge>
                  {t.sub && t.sub!=="na" && (
                    <Badge cls={t.sub}>
                      {t.sub==="missed" ? "⚠️ newly surfaced" : t.sub==="considered" ? "💬 considered" : "💡 nice-to-have"}
                    </Badge>
                  )}
                  <Badge cls={t.priority}>{PL(t.priority)}</Badge>
                  {t.area && (
                    <span style={{fontSize:11,color:T.chipText,background:T.chip,padding:"2px 7px",borderRadius:6}}>
                      {t.area}
                    </span>
                  )}
                  <span style={{fontSize:11,color:T.text5,marginLeft:"auto"}}>{t.date}</span>
                </div>

                {/* Title */}
                <div style={{fontWeight:600,fontSize:14,color:T.text,marginBottom:4,lineHeight:1.4}}>{t.title}</div>

                {/* Description */}
                <div style={{fontSize:12,color:T.text2,marginBottom:8,lineHeight:1.55,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>
                  {t.desc}
                </div>

                {/* ClickUp / notes */}
                {(t.clickup || t.resolvedNote || t.notes) && (
                  <div style={{fontSize:11,color:T.text3,marginBottom:8,display:"flex",gap:14,flexWrap:"wrap",lineHeight:1.4}}>
                    {t.clickup && <a href={t.clickup} target="_blank" rel="noreferrer" style={{color:PURPLE,fontWeight:600,textDecoration:"none"}}>🔗 ClickUp ↗</a>}
                    {t.resolvedNote && <span style={{color:"#059669",fontWeight:600}}>✓ {t.resolvedNote}</span>}
                    {t.notes && !t.resolvedNote && <span>{t.notes}</span>}
                  </div>
                )}

                {/* Actions */}
                {!isEmbedded && (
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                    <select
                      value={t.status}
                      onChange={e => changeStatus(t.id, e.target.value)}
                      style={{...sel,width:170,fontSize:12,padding:"5px 9px"}}
                    >
                      <option value="open">🔓 Open</option>
                      <option value="in-progress">🔵 In Progress</option>
                      <option value="resolved">✅ Resolved</option>
                      <option value="wont-fix">❌ Won't Fix</option>
                      <option value="planned-v2">🗺️ Planned for V2</option>
                      <option value="on-hold">⏸️ On Hold</option>
                      <option value="postponed">⏭️ Postponed</option>
                    </select>
                    <button className="btn btn-gray" onClick={() => openEdit(t.id)} style={{fontSize:11,padding:"5px 12px"}}>Edit</button>
                    <button className="btn btn-danger" onClick={() => deleteTicket(t.id)} style={{fontSize:11,padding:"5px 12px"}}>Delete</button>
                  </div>
                )}
              </div>
            );
          })}
          {filtered.length === 0 && (
            <div style={{textAlign:"center",padding:"56px 20px",color:T.text3,fontSize:14}}>
              No tickets match your current filter.
            </div>
          )}
        </div>
      </div>

      {/* Edit Modal */}
      {editId && (
        <div className="modal-overlay" onClick={e => e.target===e.currentTarget && setEditId(null)}>
          <div style={{background:T.surface,borderRadius:14,padding:0,maxWidth:580,width:"100%",maxHeight:"92vh",display:"flex",flexDirection:"column",boxShadow:"0 24px 64px rgba(0,0,0,0.22)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 22px 14px",borderBottom:`1.5px solid ${T.border}`}}>
              <div style={{fontWeight:700,fontSize:15,color:T.text}}>Edit {editData.id}</div>
              <button onClick={() => setEditId(null)} style={{background:T.closeBtn,border:"none",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:15,color:T.closeBtnText,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"18px 22px"}}>
              {[
                {k:"title",l:"Title",type:"text"},
                {k:"desc",l:"Description",type:"textarea"},
                {k:"area",l:"Area",type:"text"},
                {k:"date",l:"Date",type:"text"},
                {k:"clickup",l:"ClickUp URL",type:"text"},
                {k:"resolvedNote",l:"Resolved Note",type:"text"},
                {k:"notes",l:"Notes",type:"text"},
              ].map(f => (
                <div key={f.k} style={{marginBottom:12}}>
                  <label style={{fontSize:12,fontWeight:600,color:T.text2,display:"block",marginBottom:4}}>{f.l}</label>
                  {f.type==="textarea"
                    ? <textarea value={editData[f.k]||""} onChange={e => setEditData(v => ({...v,[f.k]:e.target.value}))} style={{...inp,height:72,resize:"vertical"}} />
                    : <input type="text" value={editData[f.k]||""} onChange={e => setEditData(v => ({...v,[f.k]:e.target.value}))} style={inp} />
                  }
                </div>
              ))}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginBottom:18}}>
                {[
                  {k:"type",opts:["bug","enhancement"]},
                  {k:"sub",opts:["missed","nicetohave","considered","na"]},
                  {k:"priority",opts:["urgent","high","normal","low"]},
                  {k:"status",opts:["open","in-progress","resolved","wont-fix","planned-v2","on-hold","postponed"]},
                ].map(f => (
                  <div key={f.k}>
                    <label style={{fontSize:11,fontWeight:600,color:T.text3,display:"block",marginBottom:3}}>{f.k}</label>
                    <select value={editData[f.k]||""} onChange={e => setEditData(v => ({...v,[f.k]:e.target.value}))} style={sel}>
                      {f.opts.map(o => <option key={o} value={o}>{o}</option>)}
                    </select>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button className="btn btn-primary" onClick={saveEdit}>Save Changes</button>
                <button className="btn btn-gray" onClick={() => setEditId(null)}>Cancel</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* CEO Dashboard Modal (tabbed: CEO Brief | #Tanner-Tickets) */}
      {showCEO && (
        <div className="modal-overlay" onClick={e => e.target===e.currentTarget && setShowCEO(false)}>
          <div style={{background:T.surface,borderRadius:14,maxWidth:780,width:"100%",maxHeight:"88vh",display:"flex",flexDirection:"column",boxShadow:"0 24px 64px rgba(0,0,0,0.22)"}}>
            <div style={{padding:"18px 22px 0",borderBottom:`1.5px solid ${T.border}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                <div>
                  <div style={{fontWeight:700,fontSize:16,color:T.text}}>CEO Dashboard</div>
                  <div style={{fontSize:12,color:T.text3,marginTop:2}}>
                    {ceoTab==="ceo" ? `DripJobs #tanner-tickets — ${new Date().toLocaleDateString()}` : "Channel summary — shareable with leadership"}
                  </div>
                </div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <button className="btn btn-outline" onClick={() => {
                    const txt = ceoTab==="ceo" ? generateCEO() : generateRebuttal();
                    navigator.clipboard.writeText(txt);
                    showToast("Copied ✓");
                  }} style={{fontSize:12,padding:"6px 14px"}}>Copy</button>
                  <button onClick={() => setShowCEO(false)} style={{background:T.closeBtn,border:"none",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:16,color:T.closeBtnText,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                </div>
              </div>
              <div style={{display:"flex",gap:0}}>
                {[["ceo","📋 CEO Brief"],["tanner","📊 #Tanner-Tickets"]].map(([k,l]) => (
                  <button key={k} onClick={() => setCeoTab(k)} style={{
                    fontSize:12,padding:"8px 16px",border:"none",cursor:"pointer",
                    fontWeight:600,fontFamily:"inherit",background:"transparent",
                    borderBottom: ceoTab===k ? `2.5px solid ${PURPLE}` : "2.5px solid transparent",
                    color: ceoTab===k ? PURPLE : T.text3,
                    transition:"color 0.15s"
                  }}>{l}</button>
                ))}
              </div>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"18px 22px"}}>
              <pre style={{fontSize:12,fontFamily:"'Courier New',monospace",background:T.pre,padding:16,borderRadius:8,whiteSpace:"pre-wrap",wordBreak:"break-word",lineHeight:1.65,color:T.preText}}>
                {ceoTab==="ceo" ? generateCEO() : generateRebuttal()}
              </pre>
            </div>
          </div>
        </div>
      )}

      {/* Stats Modal */}
      {showStats && (
        <ReportModal
          title="Resolution Stats"
          subtitle="Full backlog analytics"
          content={generateStats()}
          onClose={() => setShowStats(false)}
          onCopy={() => { navigator.clipboard.writeText(generateStats()); showToast("Copied ✓"); }}
          T={T}
        />
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<TannerTracker />);
</script>
</body>
</html>
